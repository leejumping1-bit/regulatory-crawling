name: Scheduled Regulatory Crawl

on:
  schedule:
    # 매일 00:00 UTC = 한국시간 09:00 — 매일 아침 재수집
    # (crawler.py는 매번 2026-01-01부터 다시 훑지만, data/regulations.json에는
    #  publisher+doc_no 기준으로 upsert되므로 기존 항목은 갱신되고 새 항목만 추가됩니다.
    #  최초 실행 시에만 시간이 오래 걸리고, 이후에는 신규/변경분만 반영되는 셈입니다.)
    - cron: "0 0 * * *"
  workflow_dispatch: {}

jobs:
  crawl:
    runs-on: ubuntu-latest
    # Streamlit과 달리 GitHub Actions는 요청/응답 타임아웃이 없어 전체(2026-01~) 백그라운드
    # 수집에 적합하다. 넉넉하게 90분까지 허용한다 (기본값은 360분이지만 명시적으로 제한).
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collectors (MFDS/MDCG/FDA/MHRA/MDSAP/TGA/Health Canada/PMDA)
        run: python crawler.py --since 2026-01
        # OPENAI_API_KEY / ANTHROPIC_API_KEY 를 GitHub Secrets에 등록하면
        # summarizer.py가 자동으로 LLM 요약으로 전환됩니다 (미등록 시 규칙기반 요약).
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push if updated
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/regulations.json data/snapshots/*.txt
          git commit -m "chore: scheduled regulatory data update [skip ci]" || exit 0
          git push
